<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#020617">
    <meta name="description"
        content="Explore the premium digital portfolio and blog of Asif Ansari. Insightful articles on technology, lifestyle, and modern creativity.">
    <meta name="keywords" content="Asif Ansari, Blog, Technology, Lifestyle, Creative Writing, Digital Portfolio">
    <meta name="author" content="Asif Ansari">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://blog.asifpmn.in/">

    <!-- DNS Prefetch & Preconnect for Critical Origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://maestlpaeoyamtvaxvur.supabase.co">
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">

    <!-- Preload Critical Resources -->
    <link rel="preload" href="/styles.css" as="style">
    <link rel="preload"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Outfit:wght@400;600;700;800;900&display=swap"
        as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Outfit:wght@400;600;700;800;900&display=swap">
    </noscript>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://blog.asifpmn.in/">
    <meta property="og:title" content="Asif Ansari | Premium Digital Blog">
    <meta property="og:description"
        content="Explore the premium digital portfolio and blog of Asif Ansari. Insightful articles on technology, lifestyle, and modern creativity.">
    <meta property="og:image" content="https://blog.asifpmn.in/media/og-image.jpg">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://blog.asifpmn.in/">
    <meta property="twitter:title" content="Asif Ansari | Premium Digital Blog">
    <meta property="twitter:description"
        content="Explore the premium digital portfolio and blog of Asif Ansari. Insightful articles on technology, lifestyle, and modern creativity.">
    <meta property="twitter:image" content="https://blog.asifpmn.in/media/og-image.jpg">

    <title>Asif Ansari | Premium Digital Blog</title>

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Asif Ansari",
      "url": "https://blog.asifpmn.in/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://blog.asifpmn.in/?s={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Asif Ansari",
      "jobTitle": "Creative Content Creator & Developer",
      "url": "https://blog.asifpmn.in/"
    }
    </script>

    <link rel="stylesheet" href="/styles.css">
    <link rel="icon" type="image/png" href="/logo.png">
</head>

<body class="anim-body">
    <div id="preloader">
        <div class="preloader-shutter shutter-top"></div>
        <div class="preloader-shutter shutter-bottom"></div>
        <div class="loader-content">
            <div class="loading-text-filling" data-text="BLOG BY">BLOG BY</div>
            <div class="loading-subtext-filling" data-text="ASIF ANSARI">ASIF ANSARI</div>
        </div>
    </div>
    <div class="custom-cursor" id="custom-cursor"></div>
    <div class="progress-container">
        <div class="progress-bar" id="reading-progress"></div>
    </div>
    <nav class="navbar">
        <a href="/" class="logo">
            Asif <span>Ansari.</span>
        </a>

        <button class="mobile-menu-toggle" id="mobile-menu-btn" aria-label="Toggle Menu">
            <span></span><span></span><span></span>
        </button>

        <div class="nav-links" id="nav-links">
            <a href="/" class="nav-item active">Home</a>
            <a href="/article" class="nav-item">Latest Article</a>
            <a href="https://asifpmn.in" class="nav-item">Main Website</a>
        </div>
    </nav>

    <main>
        <h1
            style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0;">
            Asif Ansari - Premium Blogging & Interactive Storytelling Platform</h1>
        <section class="hero reveal" id="hero-slider-container">
            <!-- Javascript dynamically renders hero slides here -->
        </section>

        <section class="grid-container">
            <div class="section-title reveal">
                <h2>Trending Stories</h2>
            </div>
            <div class="articles-grid">
                <!-- Javascript dynamically renders local storage cards here -->
            </div>
        </section>

        <!-- Fresh Blogs Section -->
        <section class="grid-container" style="padding-top: 2rem;">
            <div class="section-title reveal">
                <h2>Fresh Blogs</h2>
            </div>
            <div class="new-blogs-list">
                <!-- Javascript dynamically renders secondary blogs here -->
            </div>
        </section>

        <!-- All Vlogs Section -->
        <section class="grid-container" style="padding-top: 2rem;">
            <div class="section-title reveal">
                <h2>All Vlogs</h2>
            </div>
            <div class="vlogs-list articles-grid">
                <!-- Javascript dynamically renders vlogs here -->
            </div>
        </section>

        <!-- All Articles Section -->
        <section class="grid-container" style="padding-top: 2rem; padding-bottom: 4rem;">
            <div class="section-title reveal">
                <h2>All Articles</h2>
            </div>
            <div class="all-articles-list articles-grid">
                <!-- Javascript dynamically renders all articles here -->
            </div>
        </section>
    </main>

    <footer>
        <h2 style="font-size: 1.5rem; font-weight: 800; margin-bottom: 1rem;">
            <span style="color: var(--primary-red);">Asif</span>
            <span style="color: var(--pure-white);">Ansari.</span>
        </h2>
        <p>&copy; 2026 Blog By Asif Ansari. All rights reserved.</p>
    </footer>



    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="/script.js" defer></script>
    <script>
        // Emergency Fail-safe: Force kill preloader if main script hangs
        setTimeout(() => {
            const loader = document.getElementById('preloader');
            if (loader && loader.style.display !== 'none') {
                console.warn("Main script hung, force-killing preloader.");
                document.body.classList.add('loaded');
                setTimeout(() => { loader.style.display = 'none'; }, 1500);
            }
        }, 2000);
    </script>
</body>

</html>
