<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Explore insightful, immersive articles on technology, vlogging, and modern lifestyle with Asif Ansari.">
    <meta name="keywords" content="blog, interactive, technical articles, minimalist design, vlogs, lifestyle, Asif Ansari">
    <meta name="author" content="Asif Ansari">
    <meta name="robots" content="index, follow">

    <!-- Canonical URL injected dynamically by JS -->
    <link rel="canonical" href="">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="article">
    <meta property="og:url" content="">
    <meta property="og:title" id="og-title" content="Asif Ansari | Premium Insights">
    <meta property="og:description" id="og-desc" content="Read immersive, dynamic articles on the Asif Ansari premium digital platform.">
    <meta property="og:image" id="og-img" content="https://blog.asifpmn.in/media/article-fallback.jpg">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" id="twitter-title" content="Asif Ansari | Premium Insights">
    <meta property="twitter:description" id="twitter-desc" content="Read immersive, dynamic articles on the Asif Ansari premium digital platform.">
    <meta property="twitter:image" id="twitter-img" content="https://blog.asifpmn.in/media/article-fallback.jpg">

    <title>Asif Ansari | Premium Insights</title>
    <!-- Use Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
    <link rel="icon" type="image/png" href="./logo.png">
    <style>
        .article-meta-large {
            display: flex; justify-content: center; gap: 2rem; 
            color: var(--text-light); margin-bottom: 2rem; font-size: 1rem;
        }
        /* Override hero-label specifically for article reading view so it is readable on the white background */
        .article-header .hero-label {
            background: var(--primary-red);
            color: var(--pure-white);
            backdrop-filter: none;
            border: none;
            font-weight: 800;
        }
    </style>
</head>
<body class="anim-body">
    <div class="custom-cursor" id="custom-cursor"></div>
    <div class="progress-container"><div class="progress-bar" id="reading-progress"></div></div>
    <nav class="navbar">
        <a href="/" class="logo">
            Asif <span>Ansari.</span>
        </a>
        
        <button class="mobile-menu-toggle" id="mobile-menu-btn" aria-label="Toggle Menu">
            <span></span><span></span><span></span>
        </button>

        <div class="nav-links" id="nav-links">
            <a href="/" class="nav-item">Home</a>
            <a href="/article" class="nav-item active">Latest Article</a>
            <a href="https://asifpmn.in" class="nav-item">Main Website</a>
        </div>
    </nav>

    <main>
        <article class="reveal">
            <header class="article-header reveal">
                <span id="article-category-label" class="hero-label glass-effect skeleton-text" style="width: 120px; height: 24px;"></span>
                <h1 id="article-title" style="font-size: 3.5rem; font-weight: 900; margin: 1.5rem 0; letter-spacing: -1px; line-height: 1.2; display: flex; flex-direction: column; gap: 10px;">
                    <div class="skeleton-text" style="width: 85%; height: 50px;"></div>
                    <div class="skeleton-text" style="width: 60%; height: 50px;"></div>
                </h1>
                <div class="article-meta-large" id="article-meta">
                    <span class="skeleton-text" style="width: 100px; height: 18px;"></span>
                    <span class="skeleton-text" style="width: 120px; height: 18px;"></span>
                    <span class="skeleton-text" style="width: 80px; height: 18px;"></span>
                </div>
                <div id="share-tools-placeholder"></div>
                <div class="article-hero-wrapper" style="overflow: hidden; border-radius: 24px; margin-bottom: 3rem; position: relative; background: #eee; min-height: 400px; display: flex; align-items: center; justify-content: center;">
                    <img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="Cover Image" class="article-hero-img" id="main-article-img" style="opacity: 0; position: absolute; top:0; left:0; width:100%; height:100%; object-fit:cover;">
                    <div id="image-skeleton" class="skeleton-loader" style="width: 100%; height: 100%; position: absolute; inset: 0;"></div>
                </div>
                <p class="img-caption" id="cover-caption"></p>
            </header>

            <div class="article-body" id="article-content" style="min-height: 400px;">
                <div class="skeleton-text" style="width: 100%; height: 18px; margin-bottom: 1.2rem;"></div>
                <div class="skeleton-text" style="width: 100%; height: 18px; margin-bottom: 1.2rem;"></div>
                <div class="skeleton-text" style="width: 95%; height: 18px; margin-bottom: 2rem;"></div>
                
                <div class="skeleton-text" style="width: 40%; height: 32px; margin-bottom: 1.5rem;"></div>
                <div class="skeleton-text" style="width: 100%; height: 18px; margin-bottom: 1.2rem;"></div>
                <div class="skeleton-text" style="width: 100%; height: 18px; margin-bottom: 1.2rem;"></div>
                <div class="skeleton-text" style="width: 85%; height: 18px; margin-bottom: 1.2rem;"></div>
            </div>
        </article>

        <!-- NEW: More Articles Section -->
        <div class="read-next-section reveal anim-stagger-2" style="margin-top: 4rem; padding-top: 3rem; border-top: 1px solid var(--border-color);">
            <h2 style="font-size: 1.5rem; font-weight: 800; color: var(--text-dark); margin-bottom: 2rem;">Read Next</h2>
            <div id="more-articles-container" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem;">
                <!-- Dynamically injected cards -->
            </div>
        </div>
    </main>

    <footer>
        <h2 style="font-size: 1.5rem; font-weight: 800; margin-bottom: 1rem;">
            <span style="color: var(--primary-red);">Asif</span> 
            <span style="color: var(--pure-white);">Ansari.</span>
        </h2>
        <p>&copy; 2026 Asif Ansari. All rights reserved.</p>
    </footer>



    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./script.js"></script>
</body>
</html>
